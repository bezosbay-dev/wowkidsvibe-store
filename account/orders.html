<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>My Account — WoowFinds</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = { darkMode:"class", theme:{ extend:{
      colors:{"on-secondary-fixed":"#433700","surface-variant":"#dedbe9","secondary-dim":"#5f4e00","on-primary-fixed":"#000000","secondary":"#6d5a00","error-container":"#fb5151","surface-container-low":"#f3effb","inverse-surface":"#0e0d15","on-secondary":"#fff2ce","on-background":"#2f2e36","tertiary-dim":"#7122b4","tertiary-container":"#cf9aff","secondary-fixed-dim":"#edc600","primary-dim":"#a20033","on-surface":"#2f2e36","primary-fixed-dim":"#ff5773","on-surface-variant":"#5c5a63","tertiary-fixed-dim":"#c588ff","on-error":"#ffefee","background":"#f9f5ff","surface-container-lowest":"#ffffff","on-secondary-fixed-variant":"#645300","secondary-container":"#fdd404","on-secondary-container":"#594a00","on-primary":"#ffefef","surface-dim":"#d6d2e2","tertiary":"#7e32c1","on-tertiary":"#fbefff","on-primary-fixed-variant":"#5f001b","tertiary-fixed":"#cf9aff","on-primary-container":"#4e0014","primary-container":"#ff7386","outline":"#78767f","surface-container-high":"#e4e1ee","inverse-on-surface":"#9e9ba5","on-tertiary-container":"#4a0080","surface-container-highest":"#dedbe9","error":"#b31b25","surface-bright":"#f9f5ff","inverse-primary":"#ff506f","primary":"#b60d3d","on-tertiary-fixed-variant":"#560094","error-dim":"#9f0519","surface-tint":"#b60d3d","primary-fixed":"#ff7386","on-tertiary-fixed":"#270048","on-error-container":"#570008","surface":"#f9f5ff","secondary-fixed":"#fdd404","outline-variant":"#aeacb6","surface-container":"#eae6f3"},
      borderRadius:{DEFAULT:"1rem",lg:"2rem",xl:"3rem",full:"9999px"},fontFamily:{headline:["Plus Jakarta Sans"],body:["Inter"],label:["Space Grotesk"]}
    }}}
  </script>
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body class="bg-background text-on-background font-body">

  <div data-component="header"></div>

  <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-12">
      <h1 class="text-4xl font-headline font-extrabold tracking-tight">My Account</h1>
      <button id="logout-btn" class="px-6 py-2 bg-surface-container-high text-on-surface rounded-full font-headline font-bold text-sm hover:bg-surface-container-highest transition-all">Sign Out</button>
    </div>

    <div id="account-loading" class="text-center py-20">
      <div class="skeleton h-8 w-48 mx-auto mb-4"></div>
      <div class="skeleton h-4 w-64 mx-auto"></div>
    </div>

    <div id="account-content" class="grid grid-cols-1 lg:grid-cols-12 gap-12" style="display:none;">
      <!-- Profile Card -->
      <div class="lg:col-span-4">
        <div class="bg-surface-container-lowest rounded-2xl p-8 soft-shadow sticky top-32">
          <div class="w-20 h-20 rounded-full kinetic-gradient flex items-center justify-center text-white text-3xl font-headline font-extrabold mx-auto mb-6" id="avatar">?</div>
          <h2 id="customer-name" class="text-2xl font-headline font-extrabold text-center mb-1"></h2>
          <p id="customer-email" class="text-center text-on-surface-variant text-sm mb-6"></p>
          <div id="customer-address" class="bg-surface-container-low rounded-xl p-4 text-sm text-on-surface-variant"></div>
        </div>
      </div>

      <!-- Orders -->
      <div class="lg:col-span-8">
        <h2 class="text-2xl font-headline font-extrabold mb-6 flex items-center gap-3">
          <span class="w-8 h-1 bg-primary rounded-full"></span> Order History
        </h2>
        <div id="orders-list" class="space-y-6"></div>
        <div id="no-orders" class="text-center py-16" style="display:none;">
          <span class="material-symbols-outlined text-6xl text-on-surface-variant/30 mb-4 block">receipt_long</span>
          <p class="font-headline font-bold text-lg mb-2">No orders yet</p>
          <p class="text-on-surface-variant text-sm mb-6">Start your kinetic journey today!</p>
          <a href="../collection.html?handle=all" class="inline-block px-8 py-3 kinetic-gradient text-white rounded-full font-headline font-bold hover:scale-[1.02] transition-all">Shop Now</a>
        </div>
      </div>
    </div>
  </main>

  <div data-component="footer"></div>

  <script type="module">
    import { initHeader } from '../js/components/header.js';
    import { initFooter } from '../js/components/footer.js';
    import { getCustomer, customerLogout, getStoredToken } from '../js/api/customer.js';
    import { formatMoney } from '../js/api/client.js';

    initHeader();
    initFooter();

    if (!getStoredToken()) {
      window.location.href = 'login.html';
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await customerLogout();
      window.location.href = '../index.html';
    });

    async function loadAccount() {
      const customer = await getCustomer();
      if (!customer) {
        window.location.href = 'login.html';
        return;
      }

      document.getElementById('account-loading').style.display = 'none';
      document.getElementById('account-content').style.display = 'grid';

      const initials = (customer.firstName?.[0] || '') + (customer.lastName?.[0] || '');
      document.getElementById('avatar').textContent = initials.toUpperCase() || '?';
      document.getElementById('customer-name').textContent = `${customer.firstName || ''} ${customer.lastName || ''}`.trim() || 'Vibe Seeker';
      document.getElementById('customer-email').textContent = customer.email;

      const addr = customer.defaultAddress;
      document.getElementById('customer-address').innerHTML = addr
        ? `<p class="font-bold text-on-surface mb-1">Default Address</p>${addr.address1}${addr.address2 ? ', ' + addr.address2 : ''}<br/>${addr.city}, ${addr.province} ${addr.zip}<br/>${addr.country}`
        : '<p class="text-center">No address on file</p>';

      const orders = customer.orders.edges;
      if (orders.length === 0) {
        document.getElementById('no-orders').style.display = 'block';
        return;
      }

      const statusColors = {
        PAID: 'bg-green-100 text-green-800',
        PENDING: 'bg-yellow-100 text-yellow-800',
        REFUNDED: 'bg-red-100 text-red-800',
        FULFILLED: 'bg-tertiary-container text-on-tertiary-container',
        UNFULFILLED: 'bg-surface-container-high text-on-surface-variant',
      };

      document.getElementById('orders-list').innerHTML = orders.map(({ node: order }) => {
        const date = new Date(order.processedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        const items = order.lineItems.edges.map(({ node: item }) => `
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-lg bg-surface-container-low overflow-hidden flex-shrink-0">
              ${item.variant?.image ? `<img src="${item.variant.image.url}" alt="" class="w-full h-full object-cover" />` : ''}
            </div>
            <div class="min-w-0">
              <p class="text-sm font-bold truncate">${item.title}</p>
              <p class="text-xs text-on-surface-variant">Qty: ${item.quantity}</p>
            </div>
          </div>
        `).join('');

        return `
          <div class="bg-surface-container-lowest rounded-xl p-6 soft-shadow">
            <div class="flex flex-col md:flex-row justify-between gap-4 mb-4">
              <div>
                <div class="flex items-center gap-3 mb-1">
                  <span class="font-headline font-bold text-lg">Order #${order.orderNumber}</span>
                  <span class="font-label text-[10px] uppercase px-2 py-0.5 rounded-full ${statusColors[order.fulfillmentStatus] || statusColors.UNFULFILLED}">${order.fulfillmentStatus || 'Processing'}</span>
                </div>
                <p class="text-sm text-on-surface-variant">${date}</p>
              </div>
              <div class="text-right">
                <span class="font-headline font-extrabold text-xl">${formatMoney(order.totalPrice.amount)}</span>
              </div>
            </div>
            <div class="flex flex-wrap gap-4">${items}</div>
          </div>
        `;
      }).join('');
    }

    loadAccount();
  </script>
</body>
</html>
