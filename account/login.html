<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login — WoowFinds</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = { darkMode:"class", theme:{ extend:{
      colors:{"on-secondary-fixed":"#433700","surface-variant":"#dedbe9","secondary-dim":"#5f4e00","on-primary-fixed":"#000000","secondary":"#6d5a00","error-container":"#fb5151","surface-container-low":"#f3effb","inverse-surface":"#0e0d15","on-secondary":"#fff2ce","on-background":"#2f2e36","tertiary-dim":"#7122b4","tertiary-container":"#cf9aff","secondary-fixed-dim":"#edc600","primary-dim":"#a20033","on-surface":"#2f2e36","primary-fixed-dim":"#ff5773","on-surface-variant":"#5c5a63","tertiary-fixed-dim":"#c588ff","on-error":"#ffefee","background":"#f9f5ff","surface-container-lowest":"#ffffff","on-secondary-fixed-variant":"#645300","secondary-container":"#fdd404","on-secondary-container":"#594a00","on-primary":"#ffefef","surface-dim":"#d6d2e2","tertiary":"#7e32c1","on-tertiary":"#fbefff","on-primary-fixed-variant":"#5f001b","tertiary-fixed":"#cf9aff","on-primary-container":"#4e0014","primary-container":"#ff7386","outline":"#78767f","surface-container-high":"#e4e1ee","inverse-on-surface":"#9e9ba5","on-tertiary-container":"#4a0080","surface-container-highest":"#dedbe9","error":"#b31b25","surface-bright":"#f9f5ff","inverse-primary":"#ff506f","primary":"#b60d3d","on-tertiary-fixed-variant":"#560094","error-dim":"#9f0519","surface-tint":"#b60d3d","primary-fixed":"#ff7386","on-tertiary-fixed":"#270048","on-error-container":"#570008","surface":"#f9f5ff","secondary-fixed":"#fdd404","outline-variant":"#aeacb6","surface-container":"#eae6f3"},
      borderRadius:{DEFAULT:"1rem",lg:"2rem",xl:"3rem",full:"9999px"},fontFamily:{headline:["Plus Jakarta Sans"],body:["Inter"],label:["Space Grotesk"]}
    }}}
  </script>
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">

  <div data-component="header"></div>

  <main class="flex-1 flex items-center justify-center pt-32 pb-20 px-6">
    <div class="w-full max-w-md">
      <div class="text-center mb-10">
        <h1 class="text-4xl font-headline font-extrabold tracking-tight mb-3">Welcome Back</h1>
        <p class="text-on-surface-variant">Sign in to your WoowFinds account</p>
      </div>
      <form id="login-form" class="bg-surface-container-lowest rounded-2xl p-8 soft-shadow space-y-6">
        <div id="login-error" class="hidden bg-error-container/20 text-error p-4 rounded-xl text-sm font-medium"></div>
        <div class="space-y-2">
          <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant ml-2">Email</label>
          <input id="login-email" class="w-full px-5 py-4 rounded-xl bg-surface-container-highest/30 border-none focus:ring-2 focus:ring-tertiary transition-all" placeholder="vibe-seeker@email.com" type="email" required />
        </div>
        <div class="space-y-2">
          <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant ml-2">Password</label>
          <div class="relative">
            <input id="login-password" class="w-full pl-5 pr-12 py-4 rounded-xl bg-surface-container-highest/30 border-none focus:ring-2 focus:ring-tertiary transition-all" placeholder="Enter your password" type="password" required />
            <button type="button" id="login-pw-toggle" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-on-surface-variant hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </div>
        </div>
        <button id="login-btn" class="w-full py-5 kinetic-gradient text-white rounded-full font-headline font-bold text-lg hover:scale-[1.02] active:scale-95 transition-all shadow-lg" type="submit">
          Sign In
        </button>
        <p class="text-center text-sm text-on-surface-variant">
          Don't have an account? <a href="register.html" class="text-primary font-bold hover:underline">Create one</a>
        </p>
      </form>
    </div>
  </main>

  <div data-component="footer"></div>

  <script type="module">
    import { initHeader } from '../js/components/header.js';
    import { initFooter } from '../js/components/footer.js';
    import { customerLogin, getStoredToken } from '../js/api/customer.js';
    import { showToast } from '../js/components/toast.js';

    initHeader();
    initFooter();

    // Show/hide password toggle
    const loginPw = document.getElementById('login-password');
    const loginPwToggle = document.getElementById('login-pw-toggle');
    loginPwToggle?.addEventListener('click', () => {
      const isPw = loginPw.type === 'password';
      loginPw.type = isPw ? 'text' : 'password';
      loginPwToggle.querySelector('span').textContent = isPw ? 'visibility_off' : 'visibility';
    });

    if (getStoredToken()) window.location.href = 'orders.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.classList.add('hidden');

      try {
        await customerLogin(email, password);
        showToast('Welcome back!', 'success');
        window.location.href = 'orders.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Invalid email or password';
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
