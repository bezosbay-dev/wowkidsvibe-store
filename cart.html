<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Your Cart — WoowFinds</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: { extend: {
        colors: {"on-secondary-fixed":"#433700","surface-variant":"#dedbe9","secondary-dim":"#5f4e00","on-primary-fixed":"#000000","secondary":"#6d5a00","error-container":"#fb5151","surface-container-low":"#f3effb","inverse-surface":"#0e0d15","on-secondary":"#fff2ce","on-background":"#2f2e36","tertiary-dim":"#7122b4","tertiary-container":"#cf9aff","secondary-fixed-dim":"#edc600","primary-dim":"#a20033","on-surface":"#2f2e36","primary-fixed-dim":"#ff5773","on-surface-variant":"#5c5a63","tertiary-fixed-dim":"#c588ff","on-error":"#ffefee","background":"#f9f5ff","surface-container-lowest":"#ffffff","on-secondary-fixed-variant":"#645300","secondary-container":"#fdd404","on-secondary-container":"#594a00","on-primary":"#ffefef","surface-dim":"#d6d2e2","tertiary":"#7e32c1","on-tertiary":"#fbefff","on-primary-fixed-variant":"#5f001b","tertiary-fixed":"#cf9aff","on-primary-container":"#4e0014","primary-container":"#ff7386","outline":"#78767f","surface-container-high":"#e4e1ee","inverse-on-surface":"#9e9ba5","on-tertiary-container":"#4a0080","surface-container-highest":"#dedbe9","error":"#b31b25","surface-bright":"#f9f5ff","inverse-primary":"#ff506f","primary":"#b60d3d","on-tertiary-fixed-variant":"#560094","error-dim":"#9f0519","surface-tint":"#b60d3d","primary-fixed":"#ff7386","on-tertiary-fixed":"#270048","on-error-container":"#570008","surface":"#f9f5ff","secondary-fixed":"#fdd404","outline-variant":"#aeacb6","surface-container":"#eae6f3"},
        borderRadius:{DEFAULT:"1rem",lg:"2rem",xl:"3rem",full:"9999px"},fontFamily:{headline:["Plus Jakarta Sans"],body:["Inter"],label:["Space Grotesk"]}
      }}
    }
  </script>
  <link rel="stylesheet" href="css/global.css" />
</head>
<body class="bg-surface text-on-background font-body antialiased">

  <div data-component="header"></div>

  <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
    <h1 class="font-headline font-extrabold text-4xl mb-12 tracking-tight text-on-surface">Your Kinetic Cart</h1>

    <!-- Empty state -->
    <div id="cart-empty" class="text-center py-20" style="display:none;">
      <span class="material-symbols-outlined text-8xl text-on-surface-variant/30 mb-6 block">shopping_cart</span>
      <h2 class="font-headline font-extrabold text-2xl mb-3">Your cart is empty</h2>
      <p class="text-on-surface-variant mb-8">Looks like you haven't added any kinetic essentials yet.</p>
      <a href="collection.html?handle=all" class="inline-block px-10 py-4 kinetic-gradient text-white rounded-full font-headline font-bold text-lg hover:scale-[1.02] transition-all shadow-lg">Start Shopping</a>
    </div>

    <!-- Cart content -->
    <div id="cart-content" class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
      <div class="lg:col-span-8">
        <div id="cart-items" class="space-y-6"></div>
      </div>
      <div class="lg:col-span-4 sticky top-32">
        <div id="cart-summary"></div>
      </div>
    </div>
  </main>

  <div data-component="footer"></div>

  <script type="module">
    import { initHeader } from './js/components/header.js';
    import { initFooter } from './js/components/footer.js';
    import { initCartPage } from './js/pages/cart-page.js';
    initHeader();
    initFooter();
    initCartPage();
  </script>
</body>
</html>
